const categoryMeta = {
  app:         { label: "App",         cls: "cat-app" },
  image:       { label: "Image",       cls: "cat-image" },
  video:       { label: "Video",       cls: "cat-video" },

let currentFilter = "all";
let currentView = "grid";
let searchQuery = "";

function getCategories() {
  const cats = [...new Set(projects.map(p => p.category))];
  return cats.sort();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function matchesSearch(p, q) {
  if (!q) return true;
  const lower = q.toLowerCase();
  const searchable = [
    p.title, p.description, p.category,
    ...(p.tools || []),
    ...(p.links || []).map(l => l.label),
  ].join(" ").toLowerCase();
  return lower.split(/\s+/).every(term => searchable.includes(term));
}

function highlight(text, q) {
  if (!q) return text;
  const terms = q.trim().split(/\s+/).filter(Boolean);
  if (!terms.length) return text;
  const regex = new RegExp(`(${terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'gi');
  return text.replace(regex, '<mark>$1</mark>');
}

function filtered() {
  let items = currentFilter === "all" ? [...projects] : projects.filter(p => p.category === currentFilter);
  if (searchQuery) items = items.filter(p => matchesSearch(p, searchQuery));
  items.sort((a, b) => new Date(b.date) - new Date(a.date));
  return items;
}

  let html = `<button class="filter-btn active" onclick="setFilter('all')">All</button>`;
  cats.forEach(c => {
    const meta = categoryMeta[c] || categoryMeta.other;
    html += `<button class="filter-btn" onclick="setFilter('${c}')">${meta.label}</button>`;
  });
  el.innerHTML = html;
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function setView(view) {
  currentView = view;
  document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function onSearch() {
  searchQuery = document.getElementById("searchBox").value;
  render();
}

function cardThumbHTML(p) {
  if (p.image) return `<img src="${p.image}" alt="${p.title}">`;
  // Check for custom SVG thumb
  const matchKey = Object.keys(svgThumbs).find(k => p.title.includes(k));
  if (matchKey) {
    const encoded = btoa(unescape(encodeURIComponent(svgThumbs[matchKey])));
    return `<img src="data:image/svg+xml;base64,${encoded}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;">`;
  }
  const shortTitle = p.title.split("—")[0].split("–")[0].trim();
  const label = shortTitle.length > 24 ? shortTitle.slice(0, 22) + "…" : shortTitle;
  return `<div class="emoji-icon"><span>${p.emoji || "✨"}</span><span class="thumb-label">${label}</span></div>`;
}

function cardHTML(p) {
  const meta = categoryMeta[p.category] || categoryMeta.other;
  const toolsHTML = (p.tools || []).map(t => `<span class="tool-tag">${highlight(t, searchQuery)}</span>`).join("");
  let linksHTML = "";
  if (p.link || (p.links && p.links.length)) {
    linksHTML = `<div class="card-links">`;
    if (p.link) linksHTML += `<a href="${p.link}" target="_blank" class="card-link">View Project →</a>`;
    (p.links || []).forEach(l => {
      linksHTML += `<a href="${l.url}" target="_blank" class="card-link secondary">${l.label}</a>`;
    });
    linksHTML += `</div>`;
  }
  return `
    <div class="card ${meta.cls}">
      <div class="card-thumb">${cardThumbHTML(p)}</div>
      <div class="card-body">
        <span class="card-category ${meta.cls}">${meta.label}</span>
        <h3 class="card-title">${highlight(p.title, searchQuery)}</h3>
        <p class="card-desc">${highlight(p.description, searchQuery)}</p>
        ${linksHTML}
        <div class="card-footer">
          <span class="card-date">${formatDate(p.date)}</span>
          <div class="card-tools">${toolsHTML}</div>
        </div>
      </div>
    </div>`;
}

function render() {
  const items = filtered();
  const gridEl = document.getElementById("gridView");
  const timelineEl = document.getElementById("timelineView");
  const listEl = document.getElementById("listView");
  const countEl = document.getElementById("itemCount");

  gridEl.style.display = "none";
  timelineEl.style.display = "none";
  listEl.style.display = "none";

  countEl.textContent = `Showing ${items.length} project${items.length !== 1 ? "s" : ""}`;

  if (items.length === 0) {
    gridEl.style.display = "block";
    gridEl.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>No projects found — try a different search or category!</p></div>`;
    return;
  }

  if (currentView === "grid") {
    gridEl.style.display = "grid";
    gridEl.innerHTML = items.map(cardHTML).join("");
  } else if (currentView === "timeline") {
    timelineEl.style.display = "block";
    timelineEl.innerHTML = items.map((p, i) => {
      return `<div class="timeline-item">
        <div class="timeline-dot" style="background:${getComputedStyle(document.documentElement).getPropertyValue(
          ['--pink','--orange','--green','--blue','--purple'][i % 5]
        )}"></div>
        ${cardHTML(p)}
      </div>`;
    }).join("");
  } else if (currentView === "list") {
    listEl.style.display = "flex";
    listEl.innerHTML = items.map(p => {
      const meta = categoryMeta[p.category] || categoryMeta.other;
      const linkAttr = p.link ? `onclick="window.open('${p.link}','_blank')" style="cursor:pointer"` : "";
      return `<div class="list-item" ${linkAttr}>
        <div class="list-emoji ${meta.cls}">${p.emoji || "✨"}</div>
        <div class="list-info">
          <h3>${highlight(p.title, searchQuery)}</h3>
          <p>${highlight(p.description, searchQuery)}</p>
        </div>
        <div class="list-meta">
          <span class="card-category ${meta.cls}">${meta.label}</span>
          <span class="card-date">${formatDate(p.date)}</span>
        </div>
      </div>`;
    }).join("");
  }
}

buildFilters();
render();
</script>
