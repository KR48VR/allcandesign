  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    background: #0B1120;
    color: #E8ECF1;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ==============================
     HERO + DENSE MONTAGE
     ============================== */
  .hero {
    position: relative;
    overflow: hidden;
  }
  .montage {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
    grid-auto-rows: 68px;
    gap: 2px;
  }
  .montage-cell {
    overflow: hidden;
  }
  .montage-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.35;
    filter: saturate(0.5) brightness(0.7);
    transition: opacity 0.5s, filter 0.5s;
  }
  .montage-cell:hover img {
    opacity: 0.7;
    filter: saturate(0.9) brightness(1);
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(ellipse at center, rgba(11,17,32,0.5) 0%, rgba(11,17,32,0.82) 70%);
    z-index: 2;
    padding: 24px;
  }
  .hero-overlay h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 500;
    color: #F5A623;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .hero-overlay p {
    font-size: 0.85rem;
    color: rgba(232,236,241,0.5);
    font-weight: 300;
    letter-spacing: 2px;
  }
  .hero-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to bottom, transparent, #0B1120);
    z-index: 3;
  }

  /* ==============================
     CONSTELLATION
     ============================== */
  .constellation-wrap {
    position: relative;
  }
  #constellation {
    display: block;
    width: 100%;
    cursor: default;
  }
  .pause-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(232,236,241,0.4);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
    margin: 0 auto 6px;
  }
  .pause-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #E8ECF1;
    border-color: rgba(255,255,255,0.3);
  }

  /* ==============================
     INFO BAR (between constellation & grid)
     ============================== */
  .info-bar {
    max-width: 1300px;
    margin: 0 auto;
    padding: 10px 24px 14px;
    text-align: center;
  }
  .info-bar .ib-instruction {
    font-size: 0.72rem;
    color: rgba(232,236,241,0.2);
    font-style: italic;
    margin-bottom: 0;
    transition: color 0.3s;
  }
  .info-bar.active .ib-instruction {
    color: rgba(232,236,241,0.3);
    margin-bottom: 8px;
  }
  .info-bar .ib-details {
    display: none;
  }
  .info-bar.active .ib-details {
    display: block;
  }
  .ib-top-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .ib-cluster { font-size: 0.62rem; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; }
  .ib-dot { color: rgba(232,236,241,0.15); font-size: 0.5rem; }
  .ib-title { font-family: 'Playfair Display', serif; font-size: 0.88rem; font-weight: 500; color: #E8ECF1; }
  .ib-companion { font-size: 0.66rem; color: #F5A623; opacity: 0.8; }
  .ib-desc {
    font-size: 0.72rem;
    color: rgba(232,236,241,0.4);
    line-height: 1.5;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ==============================
     GRID SECTION
     ============================== */
  .grid-section {
    padding: 28px 20px 16px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .grid-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: rgba(232,236,241,0.3);
    text-align: center;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 16px;
  }

  /* --- Card --- */
  .project-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  }
  .project-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    border-color: rgba(255,255,255,0.12);
  }
  .project-card.highlighted {
    border-color: rgba(245,166,35,0.5);
    box-shadow: 0 0 30px rgba(245,166,35,0.12);
  }

    position: relative;
    width: 100%;
    height: 170px;
    overflow: hidden;
    background: rgba(255,255,255,0.02);
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.4s;
  }
  .project-card:hover .card-img-wrap img {
    transform: scale(1.04);
  }

  .card-locate-btn {

    top: 8px; right: 8px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(11,17,32,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(232,236,241,0.6);

    display: flex; align-items: center; justify-content: center;

    z-index: 5;

  .card-locate-btn:hover {
    background: rgba(245,166,35,0.3);
    border-color: #F5A623;
    color: #F5A623;
  }

    top: 50%;

    font-size: 0.62rem;
    background: rgba(11,17,32,0.85);
    color: #F5A623;
    padding: 3px 8px;
    border-radius: 6px;
    pointer-events: none;
  }

  .card-cluster-bar {
    height: 3px;
    width: 100%;
  }

  .card-content {
    padding: 14px 16px 16px;
  }
  .card-cluster-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 8px;
    color: #E8ECF1;

  .card-desc {
    font-size: 0.78rem;
    color: rgba(232,236,241,0.55);
    line-height: 1.55;
    margin-bottom: 12px;
  }
  .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .card-tag {
    padding: 2px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    font-size: 0.62rem;
    color: rgba(232,236,241,0.45);

  .card-companion {
    font-size: 0.72rem;
    color: #F5A623;

    margin-bottom: 10px;

  .card-links {

    gap: 6px;
    flex-wrap: wrap;

    border-radius: 8px;
    text-decoration: none;
    font-size: 0.72rem;
    font-weight: 600;

    color: rgba(232,236,241,0.55);
    border: 1px solid rgba(255,255,255,0.06);

     FOOTER
     ============================== */

    text-align: center;
    padding: 40px 24px 52px;

  .footer-tagline {

    font-style: italic;
    font-size: 1rem;
    color: rgba(232,236,241,0.3);

  /* ==============================
     RESPONSIVE
     ============================== */
  @media (max-width: 640px) {
    .hero-overlay h1 { font-size: 1.5rem; }
    .montage { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); grid-auto-rows: 52px; }
    .project-grid { grid-template-columns: 1fr; }
    .info-bar { display: none; }
  }
  @media (min-width: 641px) and (max-width: 900px) {

  }
</style>

// ============================================================
// MONTAGE — dense tiled hero
// ============================================================
function buildMontage() {
  const el = document.getElementById("montage");
  // Collect all images, allow duplicates to fill rows densely
  const imgs = projects.map(p => p.image).filter(Boolean);
  // Duplicate to ensure at least 3 full rows on wide screens
  const pool = [...imgs, ...imgs].slice(0, Math.max(imgs.length, 40));
  el.innerHTML = pool.map(src =>
    `<div class="montage-cell"><img src="${src}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
  ).join("");
}

// ============================================================
// CONSTELLATION ENGINE
// ============================================================
const canvas = document.getElementById("constellation");
const ctx = canvas.getContext("2d");
const infoBar = document.getElementById("infoBar");
const infoInstruction = document.getElementById("infoInstruction");
const infoDetails = document.getElementById("infoDetails");
let W, H, nodes = [], edges = [], hoveredNode = null;
let time = 0, paused = false, pausedTime = 0;
let highlightedIndex = -1, highlightTimer = null;

function seededRandom(seed) {
  let s = seed;
  return function() { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = Math.max(400, Math.min(600, window.innerHeight * 0.55));
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutNodes();
}

function layoutNodes() {
  nodes = []; edges = [];
  const margin = 60, usableW = W - margin * 2, usableH = H - margin * 2;
  const rng = seededRandom(12345);
  projects.forEach((p, i) => {
    const cl = clusters[p.cluster]; if (!cl) return;
    const angle = (i * 137.508) * Math.PI / 180;
    const r = 15 + (i % 3) * 18;
    const bx = margin + cl.x * usableW, by = margin + cl.y * usableH;
    nodes.push({ x: bx + Math.cos(angle)*r + (rng()-0.5)*55, y: by + Math.sin(angle)*r + (rng()-0.5)*55, baseX: bx, baseY: by, radius: p.companion ? 7 : 5, project: p, index: i, visible: true, alpha: 1 });
  });
  nodes.forEach((n, i) => {
    if (n.project.companion) {
      const partner = nodes.find(m => m.project.title.includes(n.project.companion));
      if (partner && i < partner.index) edges.push({ a: n, b: partner, type: "companion" });
    }
  });
}

// Family relationships — used for hover reveal
const familyClusters = ["Three-Body Problem","Apollo 13","The Martian","Project Hail Mary"];
function getRelatedNodes(hovered) {
  if (!hovered) return [];
  const cl = hovered.project.cluster;
  if (cl === "Companion Shelf" || cl === "Hao Jingfang") {
    return nodes.filter(n => familyClusters.includes(n.project.cluster));
  }
  if (familyClusters.includes(cl)) {
    return nodes.filter(n => n.project.cluster === "Companion Shelf" || n.project.cluster === "Hao Jingfang");
  }
  return [];
}

function draw() {
  if (!paused) time = Date.now() * 0.001; else time = pausedTime;
  ctx.clearRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 120; i++) {
    const sx = ((42*(i+1)*7.3) % W), sy = ((42*(i+1)*13.7) % H);
    ctx.fillStyle = `rgba(200,210,230,${0.1 + Math.sin(time*0.7+i*2.1)*0.06})`;
    ctx.beginPath(); ctx.arc(sx, sy, 0.3+((i*3.7)%1), 0, Math.PI*2); ctx.fill();
  }

  nodes.forEach(n => { n.visible = true; n.alpha += ((1 - n.alpha) * 0.08); });

  // Nebulae
  const groups = {};
  nodes.forEach(n => { if (!groups[n.project.cluster]) groups[n.project.cluster] = []; groups[n.project.cluster].push(n); });
  Object.entries(groups).forEach(([name, ns]) => {
    const cl = clusters[name]; if (!cl) return;
    const cx = ns.reduce((s,n)=>s+n.x,0)/ns.length, cy = ns.reduce((s,n)=>s+n.y,0)/ns.length;
    const d = Math.max(50,...ns.map(n=>Math.hypot(n.x-cx,n.y-cy)))+40;
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,d);
    g.addColorStop(0, `rgba(${hx(cl.color)},0.05)`); g.addColorStop(1, `rgba(${hx(cl.color)},0)`);
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx,cy,d,0,Math.PI*2); ctx.fill();
  });

  // Cluster labels
  const drawn = new Set();
  nodes.forEach(n => {
    if (drawn.has(n.project.cluster)) return; drawn.add(n.project.cluster);
    ctx.fillStyle = `rgba(${hx(clusters[n.project.cluster].color)},0.22)`;
    ctx.font = "600 9px Inter"; ctx.textAlign = "center";
    ctx.fillText(n.project.cluster.toUpperCase(), n.baseX, n.baseY - 40);
  });

  // Edges — companion pairs only
  edges.forEach(e => {
    if (e.type === "companion") {
      const col = clusters[e.a.project.cluster]?.color || "#fff";
      ctx.strokeStyle = `rgba(${hx(col)},0.12)`; ctx.lineWidth = 4; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(e.a.x,e.a.y); ctx.lineTo(e.b.x,e.b.y); ctx.stroke();
      ctx.strokeStyle = `rgba(${hx(col)},0.35)`; ctx.lineWidth = 1.5;
      ctx.setLineDash([5,5]); ctx.lineDashOffset = -time*12;
      ctx.beginPath(); ctx.moveTo(e.a.x,e.a.y); ctx.lineTo(e.b.x,e.b.y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = `rgba(${hx(col)},0.25)`; ctx.font = "500 7px Inter"; ctx.textAlign = "center";
      ctx.fillText("⇄", (e.a.x+e.b.x)/2, (e.a.y+e.b.y)/2 - 3);
    }
  });

  // Hover reveal — glow related family nodes when hovering a parent/cousin/child
  const relatedNodes = getRelatedNodes(hoveredNode);
  relatedNodes.forEach(rn => {
    if (rn === hoveredNode) return;
    const col = clusters[rn.project.cluster]?.color || "#fff";
    const pulse = 0.25 + Math.sin(time * 3) * 0.1;
    const rg = ctx.createRadialGradient(rn.x, rn.y, rn.radius, rn.x, rn.y, rn.radius * 5);
    rg.addColorStop(0, `rgba(${hx(col)},${pulse})`);
    rg.addColorStop(1, `rgba(${hx(col)},0)`);
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(rn.x, rn.y, rn.radius * 5, 0, Math.PI * 2); ctx.fill();
    // Bright ring
    ctx.strokeStyle = `rgba(${hx(col)},${pulse + 0.1})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(rn.x, rn.y, rn.radius + 5 + Math.sin(time * 2) * 2, 0, Math.PI * 2); ctx.stroke();
  });

  // Nodes
  nodes.forEach((n, i) => {
    if (!paused) { n.x += Math.sin(time*0.5+i*1.3)*0.15; n.y += Math.cos(time*0.4+i*0.9)*0.1; }
    const col = clusters[n.project.cluster]?.color || "#fff";
    const isH = hoveredNode === n, isHL = highlightedIndex === n.index;
    const r = ((isH||isHL) ? n.radius*1.8 : n.radius) + (paused ? 0 : Math.sin(time+i)*0.5);

    if (isHL) {
      const pulse = 0.5+Math.sin(time*4)*0.3;
      ctx.strokeStyle = `rgba(255,255,255,${pulse})`; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(n.x,n.y,r+10+Math.sin(time*2)*3,0,Math.PI*2); ctx.stroke();
      const hg = ctx.createRadialGradient(n.x,n.y,r,n.x,n.y,r*6);
      hg.addColorStop(0, `rgba(${hx(col)},0.3)`); hg.addColorStop(1, `rgba(${hx(col)},0)`);
      ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(n.x,n.y,r*6,0,Math.PI*2); ctx.fill();
    }

    if (n.project.companion) {
      ctx.strokeStyle = `rgba(${hx(col)},0.2)`; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(n.x,n.y,r+4+(paused?0:Math.sin(time*0.7+i)*0.8),0,Math.PI*2); ctx.stroke();
    }

    const glR = r*(isH?4:3);
    const gg = ctx.createRadialGradient(n.x,n.y,r*0.5,n.x,n.y,glR);
    gg.addColorStop(0, `rgba(${hx(col)},${isH?0.25:0.15})`); gg.addColorStop(1, `rgba(${hx(col)},0)`);
    ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(n.x,n.y,glR,0,Math.PI*2); ctx.fill();

    ctx.fillStyle = `rgba(${hx(col)},0.85)`;
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,0.4)`;
    ctx.beginPath(); ctx.arc(n.x,n.y,r*0.35,0,Math.PI*2); ctx.fill();
  });

  // Labels
  nodes.forEach((n, i) => {
    const isH = hoveredNode === n, isHL = highlightedIndex === n.index;
    let short = n.project.title.split(" — ")[0].trim();
    if (short.length > 26) short = short.slice(0,23) + "…";
    ctx.fillStyle = `rgba(232,236,241,${(isH||isHL)?0.9:0.35})`;
    ctx.font = (isH||isHL) ? "600 9px Inter" : "400 8px Inter"; ctx.textAlign = "center";
    ctx.fillText(short, n.x, n.y + (n.project.companion ? n.radius+20 : n.radius+14));
  });

  requestAnimationFrame(draw);
}

function hx(hex) { return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`; }

function togglePause() {
  paused = !paused;
  if (paused) pausedTime = Date.now() * 0.001;
  document.getElementById("pauseBtn").textContent = paused ? "▶" : "⏸";
}

// ============================================================
// CONSTELLATION INTERACTION
// ============================================================
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let found = null;
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if ((mx-n.x)**2 + (my-n.y)**2 < (n.radius+10)**2) { found = n; break; }
  }
  if (found !== hoveredNode) {
    hoveredNode = found;
    canvas.style.cursor = hoveredNode ? "pointer" : "default";
    if (hoveredNode) showInfoBar(hoveredNode.project);
    else hideInfoBar();
  }
});
canvas.addEventListener("mouseleave", () => { hoveredNode = null; hideInfoBar(); });

// CLICK constellation node → scroll to grid card
canvas.addEventListener("click", () => {
  if (!hoveredNode) return;
  hideInfoBar();
  scrollToCard(hoveredNode.index);
});
canvas.addEventListener("touchstart", e => {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0], mx = t.clientX - rect.left, my = t.clientY - rect.top;
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if ((mx-n.x)**2 + (my-n.y)**2 < (n.radius+15)**2) { scrollToCard(n.index); e.preventDefault(); break; }
  }
});

function showInfoBar(p) {
  const cl = clusters[p.cluster];
  const sd = p.description;
  infoInstruction.textContent = "Click node to find in grid ↓";
  infoDetails.innerHTML = `
    <div class="ib-top-line">
      <span class="ib-cluster" style="color:${cl?.color||'#F5A623'}">${p.emoji} ${p.cluster}</span>
      <span class="ib-dot">●</span>
      <span class="ib-title">${p.title}</span>
      ${p.companion ? `<span class="ib-dot">●</span><span class="ib-companion">⇄ ${p.companion}</span>` : ""}
    </div>
    <div class="ib-desc">${sd}</div>
  `;
  infoBar.classList.add("active");
}
function hideInfoBar() {
  infoBar.classList.remove("active");
  infoInstruction.textContent = "Hover a node to explore";
}

// ============================================================
// SCROLL TO GRID CARD (from constellation)
// ============================================================
function scrollToCard(idx) {
  const card = document.querySelector(`.project-card[data-idx="${idx}"]`);
  if (!card) return;
  // Clear previous highlight
  document.querySelectorAll(".project-card.highlighted").forEach(c => c.classList.remove("highlighted"));
  card.classList.add("highlighted");
  card.scrollIntoView({ behavior: "smooth", block: "center" });
  setTimeout(() => card.classList.remove("highlighted"), 4000);
}

// ============================================================
// HIGHLIGHT IN CONSTELLATION (from grid card icon)
// ============================================================
function highlightInConstellation(idx) {
  clearTimeout(highlightTimer);
  highlightedIndex = idx;
  document.getElementById("constellationWrap").scrollIntoView({ behavior: "smooth", block: "center" });
  highlightTimer = setTimeout(() => { highlightedIndex = -1; }, 5000);
}

// ============================================================
// BUILD GRID — newest first, like original portfolio
// ============================================================
function buildGrid() {
  const sorted = projects.map((p, i) => ({ ...p, origIdx: i }))
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  document.getElementById("projectGrid").innerHTML = sorted.map(p => {
    const cl = clusters[p.cluster]; const col = cl?.color || "#F5A623";
    let companionHTML = p.companion ? `<div class="card-companion">⇄ Paired with: ${p.companion}</div>` : "";
    let linksHTML = `<a href="${p.link}" target="_blank" class="card-link primary">View Project →</a>`;
    (p.links || []).forEach(l => { linksHTML += `<a href="${l.url}" target="_blank" class="card-link secondary">${l.label}</a>`; });

    return `<div class="project-card" data-idx="${p.origIdx}">
      <div class="card-img-wrap">
        ${p.image ? `<img src="${p.image}" alt="" loading="lazy" onerror="this.style.display='none'">` : ""}
        <button class="card-locate-btn" onclick="event.stopPropagation();highlightInConstellation(${p.origIdx})" title="Find in constellation">✦</button>
      </div>
      <div class="card-cluster-bar" style="background:${col}"></div>
      <div class="card-content">
        <div class="card-cluster-label" style="color:${col}">${p.emoji} ${p.cluster}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.description}</div>
        <div class="card-meta">
          ${(p.tools||[]).map(t=>`<span class="card-tag">${t}</span>`).join("")}
          <span class="card-tag">${fmtDate(p.date)}</span>
        </div>
        ${companionHTML}
        <div class="card-links">${linksHTML}</div>
      </div>
    </div>`;
  }).join("");
}

function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
document.addEventListener("keydown", e => { if (e.key === "Escape") hideInfoBar(); });

// ============================================================
// INIT
// ============================================================
window.addEventListener("resize", resize);
buildMontage();
resize();
buildGrid();
draw();
</script>
